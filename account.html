<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account</title>
</head>
<body style="background:#0f172a; color:#e2e8f0; font-family:system-ui,sans-serif; margin:0; padding:2rem;">
  <h1>Account</h1>
  <p id="who"></p>
  <p><a href="/dashboard" style="color:#38bdf8;">Dashboard</a> · <a href="/pricing" style="color:#38bdf8;">Pricing</a> · <a href="/login.html" id="logout" style="color:#38bdf8;">Sign out</a></p>
  <script type="module">
    import { getCurrentUser, signOut } from './src/components/Auth.js';
    const u = await getCurrentUser();
    document.getElementById('who').textContent = u ? ('Signed in as ' + (u.email || u.id)) : 'Not signed in.';
    document.getElementById('logout').addEventListener('click', async (e) => {
      e.preventDefault();
      await signOut();
      window.location.href = '/login.html';
    });
  </script>
</body>
</html>
