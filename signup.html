<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create account | Insurance Claim Response Pro</title>
    <link rel="canonical" href="https://insuranceclaimletterhelp.com/signup.html">
</head>
<body style="background:#0f172a; color:#ffffff; font-family:'Inter',sans-serif; margin:0; padding:0; line-height:1.5;">
    <nav style="background:#1e293b; padding:1rem;">
        <strong style="color:#f5f5f5;">Insurance Claim Response Pro</strong>
        <a href="/login.html" style="color:#93c5fd; margin-left:1rem;">Sign in</a>
    </nav>
    <div style="max-width:500px; margin:2rem auto; padding:2rem; background:#ffffff; border-radius:12px; color:#2d3748;">
        <h2 style="text-align:center;">Create account</h2>
        <p style="text-align:center; color:#64748b; font-size:0.95rem;">We’ll email you a magic link — no password.</p>
        <form id="signupForm">
            <label for="email" style="display:block; font-weight:600; margin-bottom:0.5rem;">Email</label>
            <input type="email" id="email" required style="width:100%; padding:12px; border-radius:8px; border:1px solid #cbd5e1; margin-bottom:1rem; box-sizing:border-box;">
            <button type="submit" style="width:100%; padding:14px; background:#334155; color:#fff; border:none; border-radius:10px; font-weight:600; cursor:pointer;">Send magic link</button>
        </form>
        <p id="sent" style="display:none; color:#15803d; text-align:center; margin-top:1rem;">Check your email.</p>
    </div>
    <script type="module">
        import { signInWithMagicLink } from './src/components/Auth.js';
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const redirect = new URL(`${window.location.origin}/app`);
            const { error } = await signInWithMagicLink(email, redirect.toString());
            if (error) { alert(error.message); return; }
            document.getElementById('sent').style.display = 'block';
        });
    </script>
</body>
</html>
