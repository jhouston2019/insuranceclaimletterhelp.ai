<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="supabase-url" content="%%SUPABASE_URL%%" />
  <meta name="supabase-anon-key" content="%%SUPABASE_ANON_KEY%%" />
  <title>Payment confirmed</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body style="background:#0f1e35; color:#fff; font-family:'Inter',sans-serif;">
  <div style="text-align:center; padding:60px 20px; max-width:560px; margin:0 auto;">
    <h1>Confirming your purchase</h1>
    <p id="msg" style="color:#cbd5e1;">Setting up your secure session…</p>
    <div id="blocked" style="display:none; margin-top:24px; padding:20px; background:#1e293b; border-radius:12px; text-align:left;">
      <p style="color:#fca5a5; margin:0 0 12px; font-weight:600;">We could not confirm payment yet.</p>
      <p style="color:#94a3b8; font-size:0.95rem; margin:0 0 16px;">You can retry verification, use recovery, or return to pricing.</p>
      <div style="display:flex; flex-direction:column; gap:10px;">
        <button type="button" id="btnRetry" style="padding:12px; border-radius:8px; border:none; background:#334155; color:#fff; font-weight:600; cursor:pointer;">Retry verification</button>
        <a href="/recover" style="display:block; text-align:center; padding:12px; border-radius:8px; background:#475569; color:#fff; text-decoration:none; font-weight:600;">Go to recovery</a>
        <a href="/pricing" style="display:block; text-align:center; padding:12px; border-radius:8px; background:#0f172a; color:#cbd5e1; text-decoration:none; border:1px solid #334155;">Back to pricing</a>
      </div>
    </div>
    <div id="fatal" style="display:none; margin-top:24px; padding:20px; background:#450a0a; border-radius:12px; color:#fecaca;">
      <p id="fatalText" style="margin:0;"></p>
      <a href="/pricing" style="display:inline-block; margin-top:12px; color:#fff;">Pricing</a>
    </div>
  </div>
  <script type="module">
    const LS_KEY = 'iclh_checkout_session_id';
    const BACKOFF_MS = [1000, 2000, 3000, 5000, 4000];
    const MAX_WAIT_MS = 15000;

    const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

    function setMsg(t) {
      const el = document.getElementById('msg');
      if (el) el.textContent = t;
    }

    function showBlocked() {
      document.getElementById('blocked').style.display = 'block';
    }

    function showFatal(text) {
      document.getElementById('fatal').style.display = 'block';
      document.getElementById('fatalText').textContent = text;
    }

    async function getSupabase() {
      const urlMeta = document.querySelector('meta[name="supabase-url"]')?.content?.trim() || '';
      const keyMeta = document.querySelector('meta[name="supabase-anon-key"]')?.content?.trim() || '';
      const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2');
      return createClient(urlMeta, keyMeta);
    }

    async function verifyPaymentLoop(supabase, sessionId) {
      const headers = { 'Content-Type': 'application/json' };
      const { data: { user: authUser } } = await supabase.auth.getUser();
      if (!authUser) {
        console.log(JSON.stringify({ event: 'PAYMENT_INVALID', reason: 'no_user_for_verify', ts: new Date().toISOString() }));
        return { done: false, fatal: 'Not authenticated. Try again from pricing.' };
      }
      const { data: { session } } = await supabase.auth.getSession();
      const token = session?.access_token;
      if (!token) {
        console.log(JSON.stringify({ event: 'PAYMENT_INVALID', reason: 'no_bearer_for_verify', ts: new Date().toISOString() }));
        return { done: false, fatal: 'Not authenticated. Try again from pricing.' };
      }
      headers['Authorization'] = 'Bearer ' + token;

      let elapsed = 0;
      let i = 0;
      while (elapsed < MAX_WAIT_MS) {
        const vr = await fetch('/api/verify-payment', {
          method: 'POST',
          headers,
          body: JSON.stringify({ session_id: sessionId }),
        });
        let j = {};
        try { j = await vr.json(); } catch (_) {}

        if (vr.status === 401) {
          return { done: false, fatal: 'Session expired. Sign in again from pricing.' };
        }
        if (vr.status === 429) {
          return { done: false, fatal: 'Too many verification attempts. Try again later.' };
        }
        if (vr.status === 403) {
          return { done: false, fatal: j.message || 'Session does not belong to user.' };
        }

        const paidOk = j.status === 'paid';
        if (paidOk) {
          console.log(JSON.stringify({ event: 'PAYMENT_FLOW_COMPLETE', phase: 'success_page', session_id: sessionId, user_id: j.userId, source: 'client_verify', ts: new Date().toISOString() }));
          try { localStorage.removeItem(LS_KEY); } catch (_) {}
          return { done: true };
        }

        if (j.status === 'invalid') {
          console.log(JSON.stringify({ event: 'PAYMENT_INVALID', reason: j.message || 'invalid', session_id: sessionId, ts: new Date().toISOString() }));
          return { done: false, fatal: j.message || 'Verification rejected.' };
        }

        if (j.status === 'failed') {
          console.log(JSON.stringify({ event: 'PAYMENT_FAILED', reason: j.message || 'failed', session_id: sessionId, ts: new Date().toISOString() }));
          return { done: false, fatal: j.message || 'Payment verification failed.' };
        }

        if (j.status === 'pending' || !j.status) {
          const wait = BACKOFF_MS[Math.min(i, BACKOFF_MS.length - 1)];
          await sleep(wait);
          elapsed += wait;
          i++;
          continue;
        }

        const wait = BACKOFF_MS[Math.min(i, BACKOFF_MS.length - 1)];
        await sleep(wait);
        elapsed += wait;
        i++;
      }

      console.log(JSON.stringify({ event: 'PAYMENT_PENDING_TIMEOUT', session_id: sessionId, ts: new Date().toISOString() }));
      return { done: false, timeout: true };
    }

    async function establishAuth(supabase, sessionId) {
      const cs = await fetch('/.netlify/functions/create-session-from-stripe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId }),
      });
      const csData = await cs.json();
      if (!cs.ok) {
        return { ok: false, error: csData.error || 'Could not establish session.' };
      }

      if (csData.action_link && !csData.token_hash) {
        window.location.href = csData.action_link;
        return { ok: false, redirected: true };
      }

      if (!csData.token_hash) {
        return { ok: false, error: 'No login token returned.' };
      }

      let { error: vErr } = await supabase.auth.verifyOtp({
        token_hash: csData.token_hash,
        type: 'email',
      });
      if (vErr) {
        ({ error: vErr } = await supabase.auth.verifyOtp({
          token_hash: csData.token_hash,
          type: 'magiclink',
        }));
      }
      if (vErr) {
        return { ok: false, error: vErr.message };
      }

      return { ok: true };
    }

    async function run() {
      const params = new URLSearchParams(window.location.search);
      let sessionId = params.get('session_id') || localStorage.getItem(LS_KEY);
      if (!sessionId) {
        setMsg('Missing checkout session. Redirecting…');
        await sleep(800);
        window.location.href = '/pricing';
        return;
      }
      try {
        localStorage.setItem(LS_KEY, sessionId);
      } catch (_) {}

      const supabase = await getSupabase();

      const { data: { user: existingUser } } = await supabase.auth.getUser();

      if (!existingUser) {
        setMsg('Signing you in…');
        const authRes = await establishAuth(supabase, sessionId);
        if (authRes.redirected) return;
        if (!authRes.ok) {
          showFatal(authRes.error || 'Authentication failed.');
          return;
        }
      }

      setMsg('Verifying payment…');
      const result = await verifyPaymentLoop(supabase, sessionId);

      if (result.done) {
        setMsg('Redirecting to your workspace…');
        window.location.replace('/app');
        return;
      }

      if (result.fatal) {
        showFatal(result.fatal);
        return;
      }

      if (result.timeout) {
        setMsg('');
        showBlocked();
        return;
      }

      setMsg('');
      showBlocked();
    }

    document.getElementById('btnRetry')?.addEventListener('click', () => {
      window.location.reload();
    });

    run().catch((e) => {
      console.error(e);
      showFatal('Something went wrong. Use recovery or pricing.');
    });
  </script>
</body>
</html>
