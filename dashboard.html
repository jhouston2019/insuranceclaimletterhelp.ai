<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="supabase-url" content="%%SUPABASE_URL%%" />
    <meta name="supabase-anon-key" content="%%SUPABASE_ANON_KEY%%" />
    <title>Your Dashboard | Insurance Claim Response Pro</title>
    <meta name="description" content="Access your Insurance Claim Response Pro dashboard to view your claim letter analyses, response letters, and account information.">
    <link rel="canonical" href="https://insuranceclaimletterhelp.com/dashboard.html">
</head>
<body style="background:#0f172a; color:#ffffff; font-family:'Inter',sans-serif; margin:0; padding:0; line-height:1.5;">
    <nav style="background:#1e293b; padding:1rem; box-shadow:0 1px 4px rgba(0,0,0,0.1); display:flex; justify-content:space-between; border-bottom: 2px solid #334155;">
        <div style="color: #f5f5f5;"><strong>Insurance Claim Response Pro</strong></div>
        <div>
            <a href="/dashboard" style="color: #f5f5f5; text-decoration: none; margin: 0 10px; padding: 8px 16px; border-radius: 4px;">Dashboard</a> |
            <a href="/pricing" style="color: #f5f5f5; text-decoration: none; margin: 0 10px; padding: 8px 16px; border-radius: 4px;">Pricing</a> |
            <a href="/login.html" style="color: #f5f5f5; text-decoration: none; margin: 0 10px; padding: 8px 16px; border-radius: 4px;">Login</a>
        </div>
    </nav>

    <div style="width:min(1120px, 92%); margin-inline:auto; padding:2rem 0;">
        <div style="background:linear-gradient(135deg,#1e3a5f,#0f172a); border:1px solid #334155; border-radius:14px; padding:1.5rem; margin-bottom:1.5rem;">
            <a href="/upload" style="display:inline-block; background:#22c55e; color:#fff; padding:16px 28px; border-radius:10px; font-weight:700; text-decoration:none; font-size:1.05rem; box-shadow:0 6px 20px rgba(34,197,94,.35);">Start New Estimate Review →</a>
            <p style="color:#94a3b8; margin:0.75rem 0 0; font-size:0.95rem;">Upload a new insurer letter and run the claim workflow.</p>
        </div>

        <h1 style="color:#ffffff; font-size:2.5rem; margin-bottom:2rem;">Your Dashboard</h1>
        
        <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:2rem; margin:2rem 0;">
            <div style="background:#ffffff; padding:2rem; border-radius:12px; box-shadow:0 4px 6px rgba(0,0,0,0.1); color:#2d3748; border:1px solid #e2e8f0;">
                <h3 style="color:#2d3748; font-size:1.5rem; margin-bottom:1rem;">Plan &amp; billing</h3>
                <div id="billingSnapshot">
                    <p style="color:#4a5568;">Loading…</p>
                </div>
                <a href="/pricing" style="display:inline-block; margin-top:1rem; background:#0ea5e9; color:white; padding:12px 22px; border-radius:10px; font-weight:600; text-decoration:none;">Upgrade plan</a>
            </div>

            <div style="background:#ffffff; padding:2rem; border-radius:12px; box-shadow:0 4px 6px rgba(0,0,0,0.1); color:#2d3748; border:1px solid #e2e8f0;">
                <h3 style="color:#2d3748; font-size:1.5rem; margin-bottom:1rem;">Recent letters</h3>
                <div id="recentLetters">
                    <p style="color:#4a5568;">Loading your letters…</p>
                </div>
            </div>
            
            <div style="background:#ffffff; padding:2rem; border-radius:12px; box-shadow:0 4px 6px rgba(0,0,0,0.1); color:#2d3748; border:1px solid #e2e8f0;">
                <h3 style="color:#2d3748; font-size:1.5rem; margin-bottom:1rem;">Quick actions</h3>
                <div style="display:flex; flex-direction:column; gap:1rem;">
                    <a href="/upload" style="background:#334155; color:white; padding:14px 28px; border-radius:10px; font-weight:600; text-decoration:none; text-align:center;">New upload</a>
                    <a href="/claim-defense.html" style="background:#475569; color:white; padding:14px 28px; border-radius:10px; font-weight:600; text-decoration:none; text-align:center;">Open full wizard</a>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { getUserDocuments } from './src/components/UploadForm.js';
        import { getCurrentUser, getSession } from './src/components/Auth.js';
        
        let currentUser = null;
        
        document.addEventListener('DOMContentLoaded', async () => {
            currentUser = await getCurrentUser();
            
            if (!currentUser) {
                alert('Please login to access your dashboard');
                window.location.href = '/login.html?redirect=' + encodeURIComponent('/dashboard');
                return;
            }
            
            await loadUserData();
        });
        
        async function loadUserData() {
            try {
                const documents = await getUserDocuments(currentUser.id);
                displayRecentLetters(documents);
                await loadBilling(await getSession());
            } catch (error) {
                console.error('Failed to load user data:', error);
                document.getElementById('recentLetters').innerHTML = '<p>Failed to load letters</p>';
            }
        }

        async function loadBilling(session) {
            const token = session?.access_token ?? '';
            const res = await fetch('/.netlify/functions/billing-status', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    ...(token ? { Authorization: 'Bearer ' + token } : {}),
                },
                body: JSON.stringify({}),
            });
            const b = await res.json();
            const used = b.usage?.used ?? 0;
            const limit = b.usage?.limit ?? 0;
            const limLabel = limit === -1 ? 'Unlimited' : limit;
            const renew = b.renewal_date
                ? new Date(b.renewal_date).toLocaleDateString()
                : '—';
            document.getElementById('billingSnapshot').innerHTML = `
                <p><strong>Plan:</strong> ${escapeHtml(String(b.plan_type || '—'))}</p>
                <p><strong>Active:</strong> ${b.active ? 'Yes' : 'No'}</p>
                <p><strong>Paid:</strong> ${b.paid === true ? 'Yes' : 'No'}</p>
                <p><strong>Renewal / period end:</strong> ${renew}</p>
                <p><strong>Reviews used:</strong> ${used} of ${limLabel}</p>
            `;
        }

        function escapeHtml(s) {
            return s.replace(/[&<>"']/g, (c) => ({
                '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
            }[c]));
        }
        
        function displayRecentLetters(documents) {
            const container = document.getElementById('recentLetters');
            
            if (documents.length === 0) {
                container.innerHTML = '<p>No letters yet. <a href="/upload">Start your first estimate review →</a></p>';
                return;
            }
            
            const lettersHtml = documents.slice(0, 5).map(doc => `
                <div style="border: 1px solid #e1e5e9; padding: 1rem; margin: 0.5rem 0; border-radius: 8px;">
                    <strong>${escapeHtml(doc.file_name || '')}</strong>
                    <br>
                    <small>Uploaded: ${new Date(doc.created_at).toLocaleDateString()}</small>
                </div>
            `).join('');
            
            container.innerHTML = lettersHtml;
        }
    </script>
</body>
</html>
