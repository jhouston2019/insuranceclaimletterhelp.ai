<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow">
  <title>Admin Login - Insurance Claim Response Pro</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #fff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 20px;
    }
    
    .login-container {
      background: #1e293b;
      border-radius: 16px;
      padding: 48px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      border: 1px solid #334155;
    }
    
    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }
    
    .login-header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin: 0 0 8px 0;
      color: #fff;
    }
    
    .login-header p {
      color: #94a3b8;
      margin: 0;
      font-size: 0.875rem;
    }
    
    .form-group {
      margin-bottom: 24px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #cbd5e1;
      font-weight: 500;
      font-size: 0.875rem;
    }
    
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #0f172a;
      color: #fff;
      font-size: 1rem;
      transition: all 0.2s;
      box-sizing: border-box;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
    
    .login-btn {
      width: 100%;
      padding: 14px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .login-btn:hover {
      background: #2563eb;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
    }
    
    .login-btn:active {
      transform: translateY(0);
    }
    
    .login-btn:disabled {
      background: #475569;
      cursor: not-allowed;
      transform: none;
    }
    
    .error-message {
      background: #7f1d1d;
      border: 1px solid #991b1b;
      color: #fecaca;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 0.875rem;
      display: none;
    }
    
    .error-message.show {
      display: block;
    }
    
    .back-link {
      text-align: center;
      margin-top: 24px;
    }
    
    .back-link a {
      color: #94a3b8;
      text-decoration: none;
      font-size: 0.875rem;
      transition: color 0.2s;
    }
    
    .back-link a:hover {
      color: #cbd5e1;
    }
    
    .security-note {
      margin-top: 24px;
      padding: 16px;
      background: #0f172a;
      border-radius: 8px;
      border-left: 3px solid #f59e0b;
    }
    
    .security-note p {
      margin: 0;
      color: #94a3b8;
      font-size: 0.75rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h1>Admin login</h1>
      <p>Access key and password</p>
    </div>
    
    <div id="errorMessage" class="error-message"></div>
    
    <form id="loginForm">
      <div class="form-group">
        <label for="accessKey">Admin access key</label>
        <input 
          type="password" 
          id="accessKey" 
          name="accessKey" 
          required 
          autocomplete="off"
          placeholder="Same value as ADMIN_ACCESS_KEY in Netlify"
        />
      </div>
      
      <div class="form-group">
        <label for="password">Admin password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          required 
          autocomplete="current-password"
          placeholder="Your admin password"
        />
      </div>
      
      <button type="submit" class="login-btn" id="loginBtn">
        Sign In
      </button>
    </form>
    
    <div class="security-note">
      <p>
        🔒 This is a secure admin area. All login attempts are logged and monitored.
        Unauthorized access attempts will be reported.
      </p>
    </div>
    
    <div class="back-link">
      <a href="/admin-setup.html">First-time admin setup</a>
      <span style="color:#475569;"> · </span>
      <a href="/">← Back to site</a>
    </div>
  </div>

  <script type="module">
    const form = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const errorMessage = document.getElementById('errorMessage');
    
    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.classList.add('show');
      setTimeout(() => {
        errorMessage.classList.remove('show');
      }, 5000);
    }
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const accessKey = document.getElementById('accessKey').value;
      const password = document.getElementById('password').value;
      
      if (!accessKey || !password) {
        showError('Enter admin access key and password');
        return;
      }
      
      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in...';
      
      try {
        const response = await fetch('/.netlify/functions/admin-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ accessKey, password })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          showError(data.error || 'Login failed');
          loginBtn.disabled = false;
          loginBtn.textContent = 'Sign In';
          return;
        }
        
        // Store session token
        localStorage.setItem('admin_session_token', data.sessionToken);
        localStorage.setItem('admin_user', JSON.stringify({
          email: data.user.email,
          fullName: data.user.fullName,
          role: data.user.role
        }));
        
        // Redirect to dashboard
        window.location.href = '/admin-dashboard.html';
        
      } catch (error) {
        showError('Network error. Please try again.');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign In';
      }
    });
    
    // Check if already logged in
    const existingToken = localStorage.getItem('admin_session_token');
    if (existingToken) {
      // Verify token is still valid
      fetch('/.netlify/functions/admin-verify-session', {
        headers: { 'Authorization': `Bearer ${existingToken}` }
      })
      .then(res => res.json())
      .then(data => {
        if (data.valid) {
          window.location.href = '/admin-dashboard.html';
        }
      })
      .catch(() => {
        // Token invalid, stay on login page
        localStorage.removeItem('admin_session_token');
        localStorage.removeItem('admin_user');
      });
    }
  </script>
</body>
</html>
