<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow">
  <title>Admin Login</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 360px; margin: 2rem auto; padding: 0 1rem; }
    label { display: block; margin-top: 1rem; font-weight: 600; }
    input { width: 100%; box-sizing: border-box; padding: 0.5rem; margin-top: 0.25rem; }
    button { margin-top: 1.25rem; width: 100%; padding: 0.6rem; font-weight: 600; cursor: pointer; }
    a { display: inline-block; margin-top: 1rem; }
  </style>
</head>
<body>
  <h1>Admin login</h1>
  <label for="accessKey">Access key</label>
  <input id="accessKey" autocomplete="off" />
  <label for="password">Password</label>
  <input id="password" type="password" autocomplete="current-password" />
  <button type="button" id="loginBtn">Sign in</button>
  <div><a href="/">← Back to site</a></div>

  <script>
    document.getElementById('loginBtn').addEventListener('click', function () {
      fetch("/.netlify/functions/admin-login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          accessKey: document.getElementById("accessKey").value,
          password: document.getElementById("password").value
        })
      })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            localStorage.setItem('admin_session_token', document.getElementById("accessKey").value);
            localStorage.setItem('admin_user', JSON.stringify({
              email: 'Admin',
              fullName: 'Admin',
              role: 'super_admin'
            }));
            window.location.href = "/admin-dashboard.html";
          } else {
            alert("Invalid credentials");
          }
        })
        .catch(function () {
          alert("Invalid credentials");
        });
    });

    (function () {
      var existingToken = localStorage.getItem('admin_session_token');
      if (existingToken) {
        fetch('/.netlify/functions/admin-verify-session', {
          headers: { 'Authorization': 'Bearer ' + existingToken }
        })
          .then(function (res) { return res.json(); })
          .then(function (data) {
            if (data.valid) {
              window.location.href = '/admin-dashboard.html';
            }
          })
          .catch(function () {
            localStorage.removeItem('admin_session_token');
            localStorage.removeItem('admin_user');
          });
      }
    })();
  </script>
</body>
</html>
