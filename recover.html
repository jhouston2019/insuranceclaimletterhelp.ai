<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recover payment</title>
</head>
<body style="background:#0f172a; color:#e2e8f0; font-family:system-ui,sans-serif; padding:2rem; text-align:center;">
  <p id="line">Checking payment state…</p>
  <script type="module">
    const p = new URLSearchParams(window.location.search);
    const sessionId = p.get('session_id');
    const sid = sessionId || localStorage.getItem('last_checkout_session_id');

    const res = await fetch('/.netlify/functions/recover-payment-state', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId: sid })
    });
    const j = await res.json();
    const line = document.getElementById('line');
    if (j.redirect === '/app') {
      line.textContent = 'Payment found. Redirecting…';
      window.location.href = '/app' + (sid ? '?session_id=' + encodeURIComponent(sid) : '');
    } else if (j.redirect === '/success' && j.retry_session) {
      line.textContent = 'Still processing. Retrying confirmation…';
      window.location.href = '/success?session_id=' + encodeURIComponent(j.retry_session);
    } else {
      line.textContent = 'No completed payment found.';
      window.location.href = '/pricing';
    }
  </script>
</body>
</html>
